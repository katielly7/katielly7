<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Zoado 😆</title>

<style>
body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    position: relative;
}

img {
    width: 300px;
    border-radius: 10px;
}

/* Nariz zoado */
.nariz {
    position: absolute;
    top: 55%;
    left: 50%;
    width: 60px;
    height: 100px;
    background: #d18b6b;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    filter: blur(1px);
}

/* Texto por cima */
.texto {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 2px 2px 5px black;
}
</style>

</head>
<body>

<div class="container">
    <div class="texto">eu sou narizuda 😆</div>
    <img src="foto.jpg" alt="foto">
    <div class="nariz"></div>
</div>

</body>
</html>
